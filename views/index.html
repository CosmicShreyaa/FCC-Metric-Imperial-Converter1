<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metric-Imperial Converter</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <h1>Metric &harr; Imperial Converter</h1>
  <p>Try: <code>/api/convert?input=10L</code></p>

  <input id="input" type="text" placeholder="e.g. 10L, 5.4/3mi, kg">
  <button id="convert-btn">Convert</button>
  <pre id="result"></pre>

  <script>
    document.getElementById('convert-btn').addEventListener('click', async () => {
      const input = document.getElementById('input').value;
      const res = await fetch('/api/convert?input=' + encodeURIComponent(input));
      const contentType = res.headers.get('content-type') || '';
      const data = contentType.includes('json') ? (await res.json()).string : await res.text();
      document.getElementById('result').textContent = data;
    });
  </script>
</body>
</html>
